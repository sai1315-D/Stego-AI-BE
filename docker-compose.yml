version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - SUPABASE_URL=https://your-supabase-project.supabase.co
      - SUPABASE_KEY=your-supabase-anon-key
      - JWT_SECRET=your-jwt-signing-secret-key-change-this-in-production
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    volumes:
      - .:/app
